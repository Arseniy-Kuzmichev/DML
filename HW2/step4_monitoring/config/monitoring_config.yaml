service:
  host: "localhost"
  port: 8000
  base_url: "http://localhost:8000"
  # Если сервис из шага 2 уже запущен, оставьте пустым.
  # Если хотите запускать его программно, впишите команду, например:
  # start_command: "uvicorn app.main:app --host 0.0.0.0 --port 8000"
  start_command: ""
  startup_wait_seconds: 5

endpoints:
  health: "/health"
  predict: "/predict"
  predict_file_field: "file"
  # Если список пустой, мониторинг принимает любой валидный JSON-ответ.
  expected_prediction_keys: []

monitoring:
  check_interval_seconds: 30
  samples_per_check: 3
  request_timeout_seconds: 10
  test_images_dir: "test_images"

thresholds:
  response_time_ms:
    warning: 2000
    critical: 5000
  p95_latency_ms:
    warning: 3000
    critical: 6000
  error_rate_percent:
    warning: 10
    critical: 25
  consecutive_failures:
    warning: 3
    critical: 5

alerts:
  enabled: true
  cooldown_minutes: 5

logging:
  console_colors: true
  log_file: "logs/monitoring.log"
  metrics_file: "logs/metrics.jsonl"
